on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Publish to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: latest
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Restore OG assets cache
        id: og-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            docs/public/og
            docs/.vitepress/plugins/data/og-satori
          key: og-${{ hashFiles('docs/.vitepress/plugins/satori-og.ts') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            og-${{ hashFiles('docs/.vitepress/plugins/satori-og.ts') }}-

      - name: Build
        run: pnpm run build

      - name: Save OG assets cache
        uses: actions/cache/save@v5
        with:
          path: |
            docs/public/og
            docs/.vitepress/plugins/data/og-satori
          key: ${{ steps.og-cache-restore.outputs.cache-primary-key }}

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: cleanroom
          directory: ./docs/.vitepress/dist
          # Optional: Enable this if you want to have GitHub Deployments triggered
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Optional: Switch what branch you are publishing to.
          # By default this will be the branch which triggered this workflow
          branch: main
          # Optional: Change the working directory
          workingDirectory: ./
          # Optional: Change the Wrangler version, allows you to point to a specific version or a tag such as `beta`
          wranglerVersion: "3"
